name: Release On Version Bump

on:
  push:
    paths:
      - gutenberg-chess.php
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-version-change:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect plugin version change
        id: version
        shell: bash
        run: |
          set -euo pipefail

          extract_version() {
            grep -E '^ \* Version:' "$1" | sed -E 's/^ \* Version:[[:space:]]*//' | xargs
          }

          current_version="$(extract_version gutenberg-chess.php)"

          if [ -z "$current_version" ]; then
            echo "Unable to read plugin version from gutenberg-chess.php"
            exit 1
          fi

          before_sha="${{ github.event.before }}"
          previous_version=""

          if [ -n "${before_sha:-}" ] && [ "$before_sha" != "0000000000000000000000000000000000000000" ]; then
            if git cat-file -e "${before_sha}:gutenberg-chess.php" 2>/dev/null; then
              previous_version="$(
                git show "${before_sha}:gutenberg-chess.php" \
                | grep -E '^ \* Version:' \
                | sed -E 's/^ \* Version:[[:space:]]*//' \
                | xargs
              )"
            fi
          fi

          changed="true"

          if [ -n "$previous_version" ] && [ "$previous_version" = "$current_version" ]; then
            changed="false"
          fi

          echo "version=$current_version" >> "$GITHUB_OUTPUT"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

          echo "Current version: $current_version"
          if [ -n "$previous_version" ]; then
            echo "Previous version: $previous_version"
          else
            echo "Previous version: <none>"
          fi
          echo "Version changed: $changed"

  build-and-release:
    needs: detect-version-change
    if: needs.detect-version-change.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Build plugin assets
        run: npm run build

      - name: Build plugin zip
        run: npm run plugin-zip

      - name: Resolve zip path
        id: zip
        shell: bash
        run: |
          set -euo pipefail

          zip_path="gutenberg-chess.zip"

          if [ ! -f "$zip_path" ]; then
            zip_path="$(find . -maxdepth 2 -type f -name '*.zip' | head -n 1)"
          fi

          if [ -z "${zip_path:-}" ] || [ ! -f "$zip_path" ]; then
            echo "Could not find plugin zip artifact."
            exit 1
          fi

          echo "path=$zip_path" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-version-change.outputs.version }}
          name: ${{ needs.detect-version-change.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.zip.outputs.path }}
